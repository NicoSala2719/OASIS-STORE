<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oasis Store</title>
  <style>
    body {margin:0; font-family: Arial, sans-serif; background:#0d1117; color:white;}
    header {text-align:center; padding:30px; background:#111827;}
    header h1 {font-size:40px; color:#00d4ff;}
    .container {padding:20px; text-align:center;}
    .product {background:#161b22; padding:20px; margin:15px; border-radius:15px; display:inline-block; width:260px; box-shadow:0 0 10px rgba(0,0,0,0.5);} 
    .product img {width:100%; border-radius:10px;}
    .price {color:#00ff88; font-size:20px; margin:10px 0;}
    .btn {background:#00d4ff; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:bold;}
    .btn:hover {background:#00aacc;}
    footer {text-align:center; padding:20px; margin-top:20px; background:#111827;}
    .bg {background:url('https://images.unsplash.com/photo-1510557880182-3c5b57d87f8a') no-repeat center center/cover; padding:60px 20px;}
  </style>
</head>
<body>

<header>
  <h1>OASIS STORE</h1>
  <p>Fundas y Vidrios Templados para iPhone</p>
</header>

<div class="bg">
  <div class="container">

    <div class="product">
      <img src="https://images.unsplash.com/photo-1580910051074-3eb694886505" alt="Vidrio templado">
      <h2>Vidrio Templado iPhone</h2>
      <p>Protección total para tu pantalla</p>
      <div class="price">$8000</div>
      <button class="btn" onclick="window.open('https://wa.me/5492617597935','_blank')">Comprar por WhatsApp</button>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1603898037225-9f8b44f0b7e6" alt="Funda iPhone">
      <h2>Funda iPhone</h2>
      <p>Diseños modernos y resistentes</p>
      <div class="price">$8000</div>
      <button class="btn" onclick="window.open('https://wa.me/5492617597935','_blank')">Comprar por WhatsApp</button>
    </div>

  </div>
</div>

<footer>
  <p>© 2026 Oasis Store - Todos los derechos reservados</p>
</footer>

</body>
</html>
